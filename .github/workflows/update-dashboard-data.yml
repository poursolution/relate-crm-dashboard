name: Update CRM dashboard data
on:
  schedule:
    - cron: '5 0 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch data from n8n
        run: curl -sS --fail "https://nfrnd.app.n8n.cloud/webhook/crm-dashboard" -o data.json
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add data.json
          git diff --quiet --staged || git commit -m "chore: data update"
          git push
